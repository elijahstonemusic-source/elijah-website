<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Elijah Stone</title>
  <style>
    :root{
      --bg:#0a0a0c;
      --card:#0f0f13;
      --text:#f5f5f7;
      --muted:#b7b7c2;
      --line:rgba(255,255,255,.10);
      --max:1000px;
      --radius:18px;
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:var(--font);
      background:var(--bg);
      color:var(--text);
      line-height:1.45;
    }
    a{color:inherit}
    .wrap{max-width:var(--max); margin:0 auto; padding:28px 18px 72px;}

    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      padding:4px 0 18px;
      border-bottom:1px solid var(--line);
      margin-bottom:22px;
    }
    header h1{margin:0; font-size:18px; letter-spacing:.02em;}
    nav a{margin-left:14px; text-decoration:none; color:var(--muted)}
    nav a:hover{color:var(--text)}

    .hero{
      text-align:center;
      padding:60px 0 40px;
    }
    .hero h2{
      font-size:44px;
      margin:0 0 10px;
      letter-spacing:-.02em;
    }
    .hero p{
      margin:0;
      color:var(--muted);
      font-size:16px;
    }

    .section{
      margin-top:40px;
    }
    .section h2{
      text-align:center;
      font-size:24px;
      margin:0 0 16px;
    }

    .video{
      width:100%;
      max-width:900px;
      margin:0 auto;
      aspect-ratio:16/9;
      border:1px solid var(--line);
      border-radius:var(--radius);
      overflow:hidden;
      background:#000;
    }
    iframe{width:100%; height:100%; border:0}

    .cta-row{
      display:flex;
      justify-content:center;
      gap:14px;
      margin-top:16px;
      flex-wrap:wrap;
    }
    .btn{
      padding:12px 18px;
      border-radius:999px;
      border:1px solid var(--line);
      text-decoration:none;
      color:var(--text);
    }
    .btn.primary{
      border-color:rgba(255,255,255,.4);
    }

    footer{
      margin-top:60px;
      padding-top:20px;
      border-top:1px solid var(--line);
      color:var(--muted);
      font-size:12px;
      text-align:center;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <header>
      <h1>Elijah Stone</h1>
      <nav>
        <a href="/epk/">EPK</a>
        <a href="https://instagram.com/elijahstonesongs" target="_blank">Instagram</a>
      </nav>
    </header>

    <section class="hero">
      <h2>NYC singer-songwriter</h2>
      <p>Timeless, groovy pop</p>
    </section>

    <!-- STREAM EP SECTION -->
    <section class="section" id="stream">
      <h2>Stream <em>Twenty-Second Catch</em> Now</h2>
      <div class="cta-row">
        <a class="btn primary" href="https://open.spotify.com/album/3GSTQy9r1nsRspMinUZYtq" target="_blank">Spotify</a>
        <a class="btn primary" href="https://music.apple.com/us/album/twenty-second-catch-ep/1842371913" target="_blank">Apple Music</a>
      </div>
    </section>

    <!-- MUSIC VIDEO SECTION -->
    <section class="section" id="music-video">
      <h2>Watch the “Look Listen” Music Video</h2>
      <div class="video">
        <iframe
          src="https://www.youtube.com/embed/uQIve5WK1C4"
          title="Elijah Stone — Look Listen (Music Video)"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen>
        </iframe>
      </div>
    </section>

    <!-- CONTACT -->
    <section class="section" id="contact">
      <h2>Contact</h2>
      <div class="cta-row">
        <a class="btn" href="mailto:elijahstonemusic@gmail.com">elijahstonemusic@gmail.com</a>
      </div>
    </section>

    <footer>
      <div>© <span id="year"></span> Elijah Stone • NYC</div>
    </footer>

  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
